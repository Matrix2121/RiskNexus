version: "3.8"

# Root compose for RiskNexus PoC
# - chroamdb service with persistent volume
# - placeholder FastAPI services for orchestrator + bots
# - all services share a custom network

services:
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - risknexus_net

  orchestrator:
    build: 
      context: .
      dockerfile: ./services/orchestrator/Dockerfile
    ports:
      - "8001:8000"
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  sql-bot:
    build: 
      context: .
      dockerfile: ./services/sql-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

  graph-bot:
    build: 
      context: .
      dockerfile: ./services/graph-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

  search-bot:
    build: 
      context: .
      dockerfile: ./services/search-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

  doc-bot:
    build: 
      context: .
      dockerfile: ./services/doc-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

  #decision-bot:
  #  build: ./services/decision-bot
  #  networks:
  #    - risknexus_net
  #  environment:
  #    - WORKER_REQUEST_TIMEOUT=3600

  #calc-bot:
  #  build: ./services/calc-bot
  #  networks:
  #    - risknexus_net
  #  environment:
  #    - WORKER_REQUEST_TIMEOUT=3600

  embedding-bot:
    build: 
      context: .
      dockerfile: ./services/embedding-bot/Dockerfile
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_URL=http://chromadb:8000

networks:
  risknexus_net:
    driver: bridge
