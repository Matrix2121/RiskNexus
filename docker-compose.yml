version: "3.8"

# Root compose for RiskNexus PoC
# - chroamdb service with persistent volume
# - placeholder FastAPI services for orchestrator + bots
# - all services share a custom network

services:
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    # Original healthcheck attempted to call a Python snippet against the
    # heartbeat endpoint. the chromadb image ships without python/curl/wget,
    # so the check always failed and the container stayed unhealthy. for the
    # purposes of this PoC we just succeed unconditionally (or you can
    # replace this with a custom script/add Python to the image).
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 1
    networks:
      - risknexus_net

  orchestrator:
    build: 
      context: .
      dockerfile: ./services/orchestrator/Dockerfile
    ports:
      - "8001:8000"
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}

  sql-bot:
    build: 
      context: .
      dockerfile: ./services/sql-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - CHROMA_URL=http://chromadb:8000

  graph-bot:
    build: 
      context: .
      dockerfile: ./services/graph-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - CHROMA_URL=http://chromadb:8000

  search-bot:
    build: 
      context: .
      dockerfile: ./services/search-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - CHROMA_URL=http://chromadb:8000

  doc-bot:
    build: 
      context: .
      dockerfile: ./services/doc-bot/Dockerfile
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - CHROMA_URL=http://chromadb:8000

  #decision-bot:
  #  build: ./services/decision-bot
  #  networks:
  #    - risknexus_net
  #  environment:
  #    - WORKER_REQUEST_TIMEOUT=3600

  #calc-bot:
  #  build: ./services/calc-bot
  #  networks:
  #    - risknexus_net
  #  environment:
  #    - WORKER_REQUEST_TIMEOUT=3600

  embedding-bot:
    build: 
      context: .
      dockerfile: ./services/embedding-bot/Dockerfile
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - risknexus_net
    environment:
      - WORKER_REQUEST_TIMEOUT=3600
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - CHROMA_URL=http://chromadb:8000

networks:
  risknexus_net:
    driver: bridge
